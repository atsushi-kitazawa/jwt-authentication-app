openapi: 3.0.3
info:
  title: JWT Authentication App Server API
  version: 1.0.0
  description: |
    Go の `net/http` と SQLite を使った JWT 認証付き API です。
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Auth
  - name: Users
paths:
  /:
    get:
      tags:
        - Auth
      summary: Get root message
      description: JWT 認証済みユーザ向けのルート確認用エンドポイントです。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Plain text response
          content:
            text/plain:
              schema:
                type: string
                example: Hello from net/http
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /health:
    get:
      tags:
        - Health
      summary: Health check
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /login:
    post:
      tags:
        - Auth
      summary: Login
      description: ユーザ名とパスワードでログインし JWT を取得します。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: invalid name or password
  /users:
    post:
      tags:
        - Users
      summary: Create user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpsertRequest'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '409':
          description: User name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: user name already exists
    get:
      tags:
        - Users
      summary: List users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /users/name/{name}:
    get:
      tags:
        - Users
      summary: Get user by name
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
    put:
      tags:
        - Users
      summary: Update user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpsertRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
        '409':
          description: User name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: user name already exists
    delete:
      tags:
        - Users
      summary: Soft delete user
      description: 対象ユーザを論理削除します。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequestError:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_body:
              value:
                message: invalid request body
            missing_fields:
              value:
                message: name, email and password are required
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing_auth:
              value:
                message: missing authorization header
            invalid_auth:
              value:
                message: invalid authorization header
            invalid_token:
              value:
                message: invalid token
    UserNotFoundError:
      description: User not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: user not found
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    LoginRequest:
      type: object
      required:
        - name
        - password
      properties:
        name:
          type: string
          example: taro
        password:
          type: string
          example: secret123
    UserUpsertRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: taro
        email:
          type: string
          format: email
          example: taro@example.com
        password:
          type: string
          format: password
          example: secret123
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          example: '1'
        name:
          type: string
          example: taro
        email:
          type: string
          format: email
          example: taro@example.com
    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: <JWT_TOKEN>
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: invalid request body
